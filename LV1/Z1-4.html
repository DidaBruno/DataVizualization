<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <script>
        const svg = d3.select("body")
            .append("svg")
            .attr("width", 1000)
            .attr("height", 1000);

        svg.append("rect")
            .attr("x", 50)
            .attr("y", 50)
            .attr("width", 100)
            .attr("height", 600)
            .attr("fill", "yellow")
            .attr("stroke", "black")
            .attr("stroke-width", 5)
            .attr("fill-opacity", 0.5)
            .attr("stroke-opacity", 1)
    </script>
</body>
</html>
