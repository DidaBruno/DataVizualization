<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
    <script src="http://d3js.org/topojson.v1.min.js"></script>
    <style>
        #tooltip {
            position: absolute;
            background: white;
            padding: 5px 10px;
            border-radius: 10px;
            pointer-events: none;
            opacity: 0;
            font-family: Arial;
        }
    </style>
</head>
<body>
    <div id="tooltip"></div>

    <script>
        var width = 960;
        var height = 700;

        var projection = d3.geo.mercator()
            .center([0, 10])
            .scale(6000)
            .translate([17600, 4500])
            .rotate([-180, 0]);

        var path = d3.geo.path()
            .projection(projection);

        var svg = d3.select("body").append("svg")    
            .attr("width", width)
            .attr("height", height)
            .style("background", "#699669");
        
        d3.json("cro.json", function(error, cro) {
            var data = topojson.feature(cro, cro.objects.layer1);

            var tooltip = d3.select("#tooltip");
            
            var states = svg.selectAll("path.county")
                .data(data.features)
                .enter()
                .append("path")
                .attr("class", "county")
                .attr("id", function(d) { return d.id; })
                .attr("d", path) .style("fill", "#1a6119")
                .style("stroke", "#699669")
                .style("stroke-width", 1)
                .style("stroke-opacity", 1)

                .on("mouseover", function(d) {
                    d3.select(this).style("fill", "#368536");
                    tooltip.style("opacity", 0.75)
                        .text(d.properties.name);
                })
                .on("mousemove", function() {
                    tooltip.style("left", (d3.event.pageX + 10) + "px")
                        .style("top", (d3.event.pageY - 20) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).style("fill", "#1a6119");
                    tooltip.style("opacity", 0);
                });
        });
    </script>
</body>
</html>
