<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>
    <script>
        var w = 600;
        var h = 600;
        var N = 10;

        var svg = d3.select("body").append("svg")
            .attr("width", w)
            .attr("height", h)

        function rand(min, max) {
            return Math.random() * (max - min) + min;
        }

        function run() {

            var data = d3.range(N).map(function () {
                return {
                    side: rand(20, 50),
                    x: rand(0, w - 100),
                    y: rand(0, h - 100),
                    d1: rand(2000, 5000),
                    d2: rand(2000, 5000)
                };
            });

            var squares = svg.selectAll("rect")
                .data(data);

            squares.enter()
                .append("rect");

            squares
                .attr("x", function(d){ return d.x; })
                .attr("y", function(d){ return d.y; })
                .attr("width", function(d){ return d.side; })
                .attr("height", function(d){ return d.side; })
                .style("fill", "blue")
                .style("fill-opacity", 0)
                .style("stroke", "blue")
                .style("stroke-width", 2)
                .style("opacity", 1) 

                .transition()
                .delay(3000)
                .duration(function(d){ return d.d1; })
                .style("fill-opacity", 1)

                .transition()
                .duration(function(d){ return d.d2; })
                .attr("x", function(d){ return d.x - (w / 2 - d.side) / 2; })
                .attr("y", function(d){ return d.y - (w / 2 - d.side) / 2; })
                .attr("width", w / 2)
                .attr("height", h / 2)
                .style("opacity", 0);

            setTimeout(run, 13000);
        }

        run();

    </script>

</body>
</html>
