<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datumi</title>
    <script src="https://d3js.org/d3.v3.min.js"></script>
</head>
<body>

    <h2>Linijski graf - Datumi</h2>
    <svg width="800" height="400"></svg>

    <script>    
        // 1. Generiranje podataka
        var parseDate = d3.time.format("%Y-%m-%d").parse;

        var data = [
            {date: "2026-01-01", value: 30},
            {date: "2026-01-05", value: 50},
            {date: "2026-01-10", value: 40},
            {date: "2026-01-15", value: 70},
            {date: "2026-01-20", value: 60},
            {date: "2026-01-25", value: 90}
        ];

        data.forEach(function(d) {
            d.date = parseDate(d.date);
            d.value = +d.value;
        });

        // 2. Dimenzije i margine
        var margin = {top: 20, right: 20, bottom: 50, left: 50},
            width = 800 - margin.left - margin.right,
            height = 400 - margin.top - margin.bottom;

        var svg = d3.select("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        var x = d3.time.scale()
            .domain(d3.extent(data, function(d) { return d.date; }))
            .range([0, width]);
        var y = d3.scale.linear()
            .domain([0, d3.max(data, function(d) { return d.value; })])
            .range([height, 0]);

        var xAxis = d3.svg.axis()
            .scale(x)
            .orient("bottom")
            .ticks(d3.time.days, 5)
            .tickFormat(d3.time.format("%d-%m"));
        var yAxis = d3.svg.axis()
            .scale(y)
            .orient("left");

        svg.append("g")
            .attr("class", "x axis")
            .attr("transform", `translate(0,${height})`)
            .call(xAxis)
            .append("text")
                .attr("x", width / 2)
                .attr("y", 40)
                .style("text-anchor", "middle")
                .text("Datum");

        svg.append("g")
            .attr("class", "y axis")
            .call(yAxis)
            .append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", -40)
                .style("text-anchor", "middle")
                .text("Vrijednost");

        var line = d3.svg.line()
            .x(function(d) { return x(d.date); })
            .y(function(d) { return y(d.value); });

        svg.append("path")
            .datum(data)
            .attr("class", "line")
            .attr("d", line)
            .style("stroke", "steelblue")
            .style("Stroke-width", "3px")
            .style("fill", "none");
    </script>
</body>
</html>
